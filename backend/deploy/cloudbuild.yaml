# Cloud Build template. Run from repo root: gcloud builds submit --config=backend/deploy/cloudbuild.yaml .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'backend/Dockerfile', '-t', 'gcr.io/$PROJECT_ID/dbstudio-backend:$SHORT_SHA', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/dbstudio-backend:$SHORT_SHA']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dbstudio-backend
      - --image=gcr.io/$PROJECT_ID/dbstudio-backend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --concurrency=40
      - --timeout=300
      - --set-env-vars=ALLOWED_ORIGINS=*
      - --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest
images:
  - 'gcr.io/$PROJECT_ID/dbstudio-backend:$SHORT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
