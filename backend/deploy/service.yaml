# Knative Service manifest (alternative to gcloud run deploy).
# Run `gcloud run services replace deploy/service.yaml --region us-central1`.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dbstudio-backend
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "20"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/dbstudio-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_API_KEY
                  key: latest
  